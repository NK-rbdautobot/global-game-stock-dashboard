name: Update Archive Data

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: archive-data-update
  cancel-in-progress: false

jobs:
  update-archives:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch Google Sheets archives
        run: |
          python scripts/fetch_archives.py
      - name: Build dashboard
        run: |
          python scripts/build_dashboard.py
      - name: Commit archive data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data/archives.json
          git commit -m "Update Google Sheets archive data" || echo "No changes"
          git push
