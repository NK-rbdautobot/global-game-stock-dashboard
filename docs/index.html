<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>넥슨 글로벌 피어 주가·시총·회사 상세 대시보드</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script><style>
:root{--bg:#0b1020;--panel:#121a2f;--panel2:#17213a;--soft:#0f172a;--text:#eef2ff;--muted:#9aa7c7;--line:#25304d;--accent:#7dd3fc;--nexon:#8b5cf6;--good:#34d399;--bad:#fb7185;--warn:#fbbf24;--shadow:0 18px 40px rgba(0,0,0,.24)}body.light{--bg:#f5f7fb;--panel:#fff;--panel2:#edf2f7;--soft:#f8fafc;--text:#111827;--muted:#64748b;--line:#d5deee;--accent:#0369a1;--nexon:#6d28d9;--good:#059669;--bad:#e11d48;--warn:#b45309;--shadow:0 14px 28px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,rgba(125,211,252,.14),transparent 30%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:1520px;margin:auto;padding:24px 18px 70px}.top{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,var(--bg) 82%,transparent);backdrop-filter:blur(12px);padding:12px 0 14px}.topline{display:flex;justify-content:space-between;gap:16px;align-items:center}.brand h1{font-size:28px;margin:0}.meta{color:var(--muted);font-size:13px;margin-top:7px}.actions,.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs{margin-top:13px}.btn,button{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:10px 13px;cursor:pointer;text-decoration:none;font-weight:800}.btn:hover,button:hover{border-color:var(--accent)}.tab.active{background:linear-gradient(135deg,var(--accent),var(--nexon));color:white;border-color:transparent}.section{display:none}.section.active{display:block}.cards{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:13px;margin:18px 0}.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:var(--shadow)}.card.nexon{border:2px solid var(--nexon);box-shadow:0 0 0 4px rgba(139,92,246,.12),var(--shadow)}.k{color:var(--muted);font-size:12px}.v{font-size:24px;font-weight:900;margin-top:7px;letter-spacing:-.02em}.sub{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.45}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.chartbox{height:370px}.toolbar{position:sticky;top:94px;z-index:45;display:grid;grid-template-columns:1.4fr repeat(3,minmax(145px,.45fr));gap:9px;margin:16px 0;padding:10px;background:rgba(15,23,42,.78);border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(12px)}body.light .toolbar{background:rgba(248,250,252,.86)}input,select{width:100%;background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px}.table-wrap{overflow:visible;border-radius:18px;border:1px solid var(--line);background:var(--panel)}table{width:100%;border-collapse:separate;border-spacing:0;min-width:1120px}th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:right;font-size:13px;vertical-align:middle}th{position:sticky;top:156px;z-index:40;background:#e9eef5;color:#63738b;font-weight:900;font-size:16px}body:not(.light) th{background:#111b30;color:#b6c3dd}td:first-child,th:first-child{text-align:left}.name{font-weight:900}.small{display:block;color:var(--muted);font-size:12px;margin-top:3px}.up{color:var(--good);font-weight:900}.down{color:var(--bad);font-weight:900}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:12px;color:var(--muted);background:rgba(125,211,252,.07)}tr.clickable{cursor:pointer}tr.clickable:hover td{background:rgba(125,211,252,.08)}tr.nexon-row td{background:rgba(139,92,246,.14);border-top:1px solid rgba(139,92,246,.55);border-bottom:1px solid rgba(139,92,246,.55)}tr.nexon-row td:first-child{border-left:4px solid var(--nexon)}.news-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.news{padding:13px;border:1px solid var(--line);border-radius:15px;background:var(--soft)}.news a{color:var(--accent);font-weight:900;text-decoration:none}.news p{color:var(--muted);line-height:1.45;margin:8px 0 0;font-size:13px}.detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin:18px 0}.detail-title h2{margin:0;font-size:30px}.foot{color:var(--muted);font-size:12px;line-height:1.6;margin-top:16px}@media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}.grid,.grid2{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr;top:120px}th{top:205px}.news-list{grid-template-columns:1fr}.topline,.detail-head{display:block}.actions{margin-top:12px}}@media(max-width:640px){.cards,.toolbar{grid-template-columns:1fr}.wrap{padding:12px 8px}.brand h1{font-size:22px}th,td{font-size:12px;padding:9px 7px}.v{font-size:20px}}
</style></head><body><div class="wrap"><header class="top"><div class="topline"><div class="brand"><h1>넥슨 글로벌 피어 대시보드</h1><div class="meta" id="topMeta">주가·시총·기업별 재무성과·번역 뉴스 상세 페이지</div></div><div class="actions"><button id="themeBtn">라이트/다크</button><button id="refreshBtn">데이터 새로고침</button><a class="btn" href="data/market_quotes.csv" download>CSV 다운로드</a></div></div><nav class="tabs"><button class="tab active" data-page="overview">종합 상황판</button><button class="tab" data-page="peer">플랫폼사 vs 게임사</button><button class="tab" data-page="companyDetail">회사 상세</button></nav></header>
<section id="overview" class="section active"><div class="cards" id="cards"></div><div class="grid"><div class="card chartbox"><canvas id="capChart"></canvas></div><div class="card chartbox"><canvas id="countryChart"></canvas></div></div><div class="toolbar"><input id="search" placeholder="회사명/티커/국가/거래소 검색"><select id="country"><option value="">전체 국가</option></select><select id="category"><option value="">전체 유형</option></select><select id="sort"><option value="market_cap_krw_desc">시총 KRW 높은순</option><option value="change_percent_desc">상승률 높은순</option><option value="change_percent_asc">하락률 높은순</option><option value="company_ko_asc">회사명 가나다순</option></select></div><div class="table-wrap"><table id="tbl"><thead><tr><th>회사</th><th>유형</th><th>국가/거래소</th><th>티커</th><th>현재가</th><th>등락률</th><th>시총 현지통화</th><th>시총 KRW</th><th>거래량</th><th>업데이트</th><th>상태</th></tr></thead><tbody></tbody></table></div></section>
<section id="peer" class="section"><div class="grid2"><div class="card chartbox"><canvas id="platformChart"></canvas></div><div class="card chartbox"><canvas id="gameChart"></canvas></div></div><div class="cards" id="peerCards"></div></section>
<section id="companyDetail" class="section"><div id="detail"></div></section><div class="foot" id="foot"></div></div>
<script>
let RAW=[],META={},ARCH={financial_archive:{rows:[]},news_archive:{rows:[]}},charts={},SELECTED='';const KRW_EOK=100000000,KRW_JO=1000000000000;
function n(v){return Number(v||0)}function fmtNum(v,d=0){return(v==null||!isFinite(Number(v)))?'-':Number(v).toLocaleString('ko-KR',{maximumFractionDigits:d,minimumFractionDigits:d})}function fmtKrw(v){v=n(v);if(!v)return'-';if(Math.abs(v)>=KRW_JO){let jo=Math.floor(v/KRW_JO),eok=Math.round((v-jo*KRW_JO)/KRW_EOK);return eok?`${fmtNum(jo)}조 ${fmtNum(eok)}억 원`:`${fmtNum(jo)}조 원`;}return`${fmtNum(v/KRW_EOK,0)}억 원`}function fmtCapLocal(v,cur){if(!v)return'-';const unit=(cur==='KRW'||cur==='JPY')?KRW_EOK:1000000,label=(cur==='KRW'||cur==='JPY')?'억':'M';return`${fmtNum(v/unit,1)} ${label} ${cur}`}function fmtPrice(v,cur){return v==null?'-':`${fmtNum(v,(cur==='JPY'||cur==='KRW')?0:2)} ${cur||''}`}function pct(v){if(v==null||!isFinite(Number(v)))return'-';return`<span class="${v>=0?'up':'down'}">${v>=0?'+':''}${fmtNum(v,2)}%</span>`}function dt(s){try{return new Date(s).toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})}catch(e){return s||'-'}}function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function showPage(id){document.querySelectorAll('.tab,.section').forEach(x=>x.classList.remove('active'));document.querySelector(`.tab[data-page="${id}"]`)?.classList.add('active');document.getElementById(id).classList.add('active');setTimeout(refreshCharts,50)}
function filtered(){const q=search.value.trim().toLowerCase(),c=country.value,cat=category.value,sort=document.getElementById('sort').value;let rows=RAW.filter(r=>(!c||r.country===c)&&(!cat||r.category===cat)&&(!q||[r.company_ko,r.company_en,r.yahoo_symbol,r.input_ticker,r.country,r.exchange,r.category].join(' ').toLowerCase().includes(q)));rows.sort((a,b)=>sort==='market_cap_krw_desc'?n(b.market_cap_krw)-n(a.market_cap_krw):sort==='change_percent_desc'?n(b.change_percent)-n(a.change_percent):sort==='change_percent_asc'?n(a.change_percent)-n(b.change_percent):String(a.company_ko).localeCompare(String(b.company_ko),'ko'));return rows}function rankInGroup(row){let peers=RAW.filter(r=>r.category===row?.category&&r.market_cap_krw).sort((a,b)=>n(b.market_cap_krw)-n(a.market_cap_krw));return peers.findIndex(r=>r.company_ko===row?.company_ko)+1}
function renderCards(rows){const ok=rows.filter(r=>r.data_status==='ok'),total=ok.reduce((s,r)=>s+n(r.market_cap_krw),0),nexon=RAW.find(r=>r.company_ko==='넥슨'),game=RAW.filter(r=>r.category==='게임사'),platform=RAW.filter(r=>r.category==='플랫폼사');cards.innerHTML=`<div class="card nexon"><div class="k">NEXON 하이라이트</div><div class="v">${fmtKrw(nexon?.market_cap_krw)}</div><div class="sub">게임사 내 시총 ${rankInGroup(nexon)}위 · ${pct(nexon?.change_percent)}</div></div><div class="card"><div class="k">표시 기업</div><div class="v">${rows.length}개</div><div class="sub">디폴트는 게임사 유형</div></div><div class="card"><div class="k">표시군 합산 시총</div><div class="v">${fmtKrw(total)}</div><div class="sub">현재 필터 기준</div></div><div class="card"><div class="k">플랫폼사 합산</div><div class="v">${fmtKrw(platform.reduce((s,r)=>s+n(r.market_cap_krw),0))}</div><div class="sub">Alphabet · Apple · Microsoft</div></div><div class="card"><div class="k">게임사 합산</div><div class="v">${fmtKrw(game.reduce((s,r)=>s+n(r.market_cap_krw),0))}</div><div class="sub">플랫폼 3사 제외</div></div>`}
function renderTable(rows){document.querySelector('#tbl tbody').innerHTML=rows.map(r=>`<tr class="clickable ${r.company_ko==='넥슨'?'nexon-row':''}" data-company="${esc(r.company_ko)}"><td><span class="name">${esc(r.company_ko)}${r.company_ko==='넥슨'?' ★':''}</span><span class="small">${esc(r.company_en)} · 클릭해서 상세 보기</span></td><td><span class="pill">${r.category}</span></td><td>${r.country}<span class="small">${r.exchange}</span></td><td>${r.input_ticker}<span class="small">${r.yahoo_symbol}</span></td><td>${fmtPrice(r.price,r.currency)}</td><td>${pct(r.change_percent)}</td><td>${fmtCapLocal(r.market_cap_local,r.currency)}</td><td><b>${fmtKrw(r.market_cap_krw)}</b></td><td>${fmtNum(r.volume,0)}</td><td>${dt(r.market_time||r.as_of_utc)}</td><td>${r.data_status}</td></tr>`).join('');document.querySelectorAll('#tbl tbody tr').forEach(tr=>tr.onclick=()=>openCompany(tr.dataset.company))}
function makeChart(id,type,data,opt={}){if(charts[id])charts[id].destroy();let el=document.getElementById(id);if(!el)return;charts[id]=new Chart(el,{type,data,options:Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:getComputedStyle(document.body).getPropertyValue('--text')}}},scales:type==='doughnut'?{}:{x:{ticks:{color:getComputedStyle(document.body).getPropertyValue('--muted')}},y:{ticks:{color:getComputedStyle(document.body).getPropertyValue('--muted')}}}},opt)})}
function renderOverviewCharts(rows){let ok=rows.filter(r=>r.market_cap_krw).sort((a,b)=>n(b.market_cap_krw)-n(a.market_cap_krw)).slice(0,20);makeChart('capChart','bar',{labels:ok.map(r=>r.company_ko),datasets:[{label:'시총 KRW(조)',data:ok.map(r=>+(n(r.market_cap_krw)/KRW_JO).toFixed(1)),backgroundColor:ok.map(r=>r.company_ko==='넥슨'?'#8b5cf6':r.category==='플랫폼사'?'#38bdf8':'#34d399')}]},{indexAxis:'y'});let by={};rows.filter(r=>r.market_cap_krw).forEach(r=>by[r.country]=(by[r.country]||0)+n(r.market_cap_krw));let ents=Object.entries(by).sort((a,b)=>b[1]-a[1]);makeChart('countryChart','doughnut',{labels:ents.map(e=>e[0]),datasets:[{data:ents.map(e=>+(e[1]/KRW_JO).toFixed(1)),backgroundColor:['#7dd3fc','#34d399','#fbbf24','#fb7185','#a78bfa','#f472b6','#60a5fa','#94a3b8']}]} )}
function renderPeer(){['플랫폼사','게임사'].forEach((cat,i)=>{let id=i?'gameChart':'platformChart', rows=RAW.filter(r=>r.category===cat&&r.market_cap_krw).sort((a,b)=>n(b.market_cap_krw)-n(a.market_cap_krw)).slice(0,i?20:3);makeChart(id,'bar',{labels:rows.map(r=>r.company_ko),datasets:[{label:`${cat} 시총 KRW(조)`,data:rows.map(r=>+(n(r.market_cap_krw)/KRW_JO).toFixed(1)),backgroundColor:rows.map(r=>r.company_ko==='넥슨'?'#8b5cf6':i?'#34d399':'#38bdf8')}]},{indexAxis:'y'});});let nexon=RAW.find(r=>r.company_ko==='넥슨');peerCards.innerHTML=`<div class="card nexon"><div class="k">넥슨 게임사 순위</div><div class="v">${rankInGroup(nexon)}위</div><div class="sub">플랫폼 3사 제외 게임사끼리 비교</div></div>`+['플랫폼사','게임사'].map(cat=>{let rs=RAW.filter(r=>r.category===cat),up=rs.filter(r=>n(r.change_percent)>0).length;return`<div class="card"><div class="k">${cat}</div><div class="v">${rs.length}개</div><div class="sub">상승 ${up}개 · 합산 ${fmtKrw(rs.reduce((s,r)=>s+n(r.market_cap_krw),0))}</div></div>`}).join('')}
function finFor(c){return (ARCH.financial_archive?.rows||[]).find(x=>x.company_ko===c)}function newsFor(c){return (ARCH.news_archive?.rows||[]).filter(x=>x.company_ko===c)}
function openCompany(company){SELECTED=company;renderDetail();showPage('companyDetail');window.scrollTo(0,0)}
function rowMetric(label,value){return`<div class="card"><div class="k">${label}</div><div class="v">${value}</div></div>`}
function renderDetail(){let m=RAW.find(r=>r.company_ko===SELECTED)||RAW.find(r=>r.company_ko==='텐센트')||RAW[0];if(!m)return;SELECTED=m.company_ko;let fin=finFor(m.company_ko),news=newsFor(m.company_ko);let noNexon=m.company_ko==='넥슨';detail.innerHTML=`<div class="detail-head"><div class="detail-title"><button onclick="showPage('overview')">← 상황판으로</button><h2>${esc(m.company_ko)} ${m.company_ko==='넥슨'?'★':''}</h2><div class="meta">${esc(m.company_en)} · ${m.input_ticker} · ${m.category}</div></div><button onclick="openCompany('넥슨')">넥슨 보기</button></div><div class="cards">${rowMetric('현재가',fmtPrice(m.price,m.currency))}${rowMetric('등락률',pct(m.change_percent))}${rowMetric('시가총액 KRW',fmtKrw(m.market_cap_krw))}${rowMetric(`${m.category} 내 시총 순위`,rankInGroup(m)+'위')}${rowMetric('업데이트',dt(m.market_time||m.as_of_utc))}</div>${noNexon?`<div class="card nexon"><h3>재무성과 BD 아카이브 제외</h3><p class="sub">Boss 요청대로 넥슨은 현재 재무성과 BD 아카이브 데이터가 정리되기 전까지 상세 재무/뉴스 섹션에서 제외했습니다.</p></div>`:`<div class="grid2"><div class="card chartbox"><h3>분기 성과</h3><canvas id="detailQuarterChart"></canvas></div><div class="card chartbox"><h3>연간 성과</h3><canvas id="detailYearChart"></canvas></div></div><div class="card"><h3>재무제표 아카이브</h3><div id="sourceLinks"></div></div><div class="card"><h3>관련 기사</h3><p class="sub">Mail_Archive의 한글 제목/요약만 표시합니다.</p><div class="news-list" id="detailNews"></div></div>`}`;if(!noNexon){renderDetailCharts(fin);document.getElementById('sourceLinks').innerHTML=(fin?.source_links||[]).map((u,i)=>`<a class="btn" href="${u}" target="_blank" rel="noopener noreferrer">자료 ${i+1}</a>`).join(' ')||'<p class="sub">아카이브 링크가 없습니다.</p>';document.getElementById('detailNews').innerHTML=news.map(x=>`<article class="news"><span class="pill">${x.score?`점수 ${esc(x.score)}`:'Mail_Archive'}</span><span class="small">${esc(x.published_at)}</span><h3><a href="${esc(x.url)}" target="_blank" rel="noopener noreferrer">${esc(x.title_ko)}</a></h3><p>${esc(x.summary_ko)}</p></article>`).join('')||'<p class="sub">한글 번역 기사 매칭이 없습니다.</p>'}}
function renderDetailCharts(fin){let qs=fin?.quarters||[],ys=fin?.years||[];makeChart('detailQuarterChart','line',{labels:qs.map(x=>x.period),datasets:[{label:'매출',data:qs.map(x=>x.revenue),borderColor:'#7dd3fc',backgroundColor:'rgba(125,211,252,.18)'},{label:'영업이익',data:qs.map(x=>x.operating_profit),borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.18)'}]});makeChart('detailYearChart','bar',{labels:ys.map(x=>x.year),datasets:[{label:'매출',data:ys.map(x=>x.revenue),backgroundColor:'rgba(125,211,252,.65)'},{label:'영업이익',data:ys.map(x=>x.operating_profit),backgroundColor:'rgba(52,211,153,.65)'}]})}
function refreshCharts(){if(document.getElementById('overview').classList.contains('active'))renderOverviewCharts(filtered());if(document.getElementById('peer').classList.contains('active'))renderPeer();if(document.getElementById('companyDetail').classList.contains('active'))renderDetail()}
function refresh(){let rows=filtered();renderCards(rows);renderTable(rows);renderOverviewCharts(rows);renderPeer();if(!SELECTED)SELECTED=(rows[0]||RAW[0]||{}).company_ko;renderDetail();topMeta.textContent=`최종 갱신 ${dt(META.generated_at_utc)} · 정상 시총 ${META.ok_count}/${META.company_count} · 기업별 재무 ${ARCH.financial_archive?.count||0}개 · 번역 기사 ${ARCH.news_archive?.count||0}건`;foot.innerHTML='무료/지연 시세 기반 참고용 데이터입니다. 투자 판단용 실시간 호가가 아닙니다. 시가총액은 이 대시보드의 실시간 수집값만 사용하며, Google Sheet의 시가총액 탭은 사용하지 않습니다.'}
async function load(){META=await(await fetch('data/market_quotes.json?ts='+Date.now())).json();RAW=META.rows||[];ARCH=await(await fetch('data/archives.json?ts='+Date.now())).json();['country','category'].forEach(id=>{let sel=document.getElementById(id);[...new Set(RAW.map(r=>r[id]).filter(Boolean))].sort().forEach(v=>sel.insertAdjacentHTML('beforeend',`<option value="${v}">${v}</option>`))});category.value='게임사';SELECTED='텐센트';refresh()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>showPage(b.dataset.page));themeBtn.onclick=()=>{document.body.classList.toggle('light');setTimeout(refreshCharts,50)};refreshBtn.onclick=()=>location.reload();['search','country','category','sort'].forEach(id=>document.getElementById(id).addEventListener('input',refresh));load().catch(e=>foot.textContent='데이터 로드 실패: '+e);
</script></body></html>
